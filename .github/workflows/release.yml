name: Release

# Publishes installers to GitHub Releases when a version tag is pushed.
# Typical flow: merge dev → main (with version bump in that PR), then:
#   git tag v0.2.0 && git push origin v0.2.0

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.2.0). Must match package/Cargo/tauri versions."
        required: true
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: validate tag format
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "Tag must look like v1.2.3 or v1.2.3-beta.1 (got: ${TAG})"
            exit 1
          fi

      - name: checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: resolve version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG} → version ${VERSION}"

      - name: check package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAURI=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          WANT="${{ steps.version.outputs.version }}"
          echo "package.json: ${PKG}"
          echo "tauri.conf.json: ${TAURI}"
          echo "Cargo.toml: ${CARGO}"
          test "${PKG}" = "${WANT}" || { echo "package.json version mismatch"; exit 1; }
          test "${TAURI}" = "${WANT}" || { echo "tauri.conf.json version mismatch"; exit 1; }
          test "${CARGO}" = "${WANT}" || { echo "Cargo.toml version mismatch"; exit 1; }

  build:
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            tauri_args: --bundles appimage
            asset_glob: src-tauri/target/release/bundle/appimage/*.AppImage
            asset_name: swiftmask-linux.AppImage
          - platform: windows-latest
            tauri_args: --bundles nsis
            asset_glob: src-tauri/target/release/bundle/nsis/*.exe
            asset_name: swiftmask-windows-setup.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - name: checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: install frontend dependencies
        run: bun install --frozen-lockfile

      - name: check model registry is generated from Rust
        run: bun run gen:models:check

      - name: run frontend unit tests
        run: bun run test

      - name: build frontend
        run: bun run build

      - name: build and test Rust
        working-directory: ./src-tauri
        run: cargo test --locked

      - name: build Tauri release bundle
        run: bunx tauri build ${{ matrix.tauri_args }}

      - name: stage release asset
        shell: bash
        run: |
          mkdir -p release-assets
          shopt -s nullglob
          files=(${matrix.asset_glob})
          if [ ${#files[@]} -eq 0 ]; then
            echo "No bundle artifact matched: ${matrix.asset_glob}"
            exit 1
          fi
          cp "${files[0]}" "release-assets/${{ matrix.asset_name }}"

      - name: upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: release-assets/${{ matrix.asset_name }}
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  publish:
    needs: [verify-version, build]
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: download Linux asset
        uses: actions/download-artifact@v8
        with:
          name: swiftmask-linux.AppImage
          path: dist

      - name: download Windows asset
        uses: actions/download-artifact@v8
        with:
          name: swiftmask-windows-setup.exe
          path: dist

      - name: ensure AppImage is executable
        run: chmod +x dist/swiftmask-linux.AppImage

      - name: extract changelog section
        id: notes
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "body=SwiftMask v${VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BODY=$(awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "${BODY//[[:space:]]/}" ]; then
            echo "body=SwiftMask v${VERSION}" >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<EOF"
              echo "${BODY}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: SwiftMask ${{ needs.verify-version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(needs.verify-version.outputs.version, '-') }}
          fail_on_unmatched_files: true
          files: |
            dist/swiftmask-linux.AppImage
            dist/swiftmask-windows-setup.exe
