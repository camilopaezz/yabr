name: Release

# Publishes installers to GitHub Releases when a version tag is pushed.
# Typical flow: merge dev → main (with version bump in that PR), then:
#   git tag v0.2.0 && git push origin v0.2.0
#
# Artifacts:
#   Linux  — AppImage, .deb, .rpm (+ AppImage.sig for updater)
#   Windows — NSIS setup.exe, .msi (+ setup.exe.sig for updater)
#   latest.json — static signed-updater manifest (stable channel via /releases/latest)
#
# Required secrets (Ed25519 updater signing; not Authenticode):
#   TAURI_SIGNING_PRIVATE_KEY
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD (optional if key has no password)

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.2.0). Must match package/Cargo/tauri versions."
        required: true
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: validate tag format
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "Tag must look like v1.2.3 or v1.2.3-beta.1 (got: ${TAG})"
            exit 1
          fi

      - name: checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: resolve version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG} → version ${VERSION}"

      - name: check package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAURI=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          WANT="${{ steps.version.outputs.version }}"
          echo "package.json: ${PKG}"
          echo "tauri.conf.json: ${TAURI}"
          echo "Cargo.toml: ${CARGO}"
          test "${PKG}" = "${WANT}" || { echo "package.json version mismatch"; exit 1; }
          test "${TAURI}" = "${WANT}" || { echo "tauri.conf.json version mismatch"; exit 1; }
          test "${CARGO}" = "${WANT}" || { echo "Cargo.toml version mismatch"; exit 1; }

  build:
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            tauri_args: --bundles appimage,deb,rpm
            artifact_name: swiftmask-linux
          - platform: windows-latest
            tauri_args: --bundles nsis,msi
            artifact_name: swiftmask-windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            rpm

      - name: install frontend dependencies
        run: bun install --frozen-lockfile

      - name: check model registry is generated from Rust
        run: bun run gen:models:check

      - name: run frontend unit tests
        run: bun run test

      - name: build frontend
        run: bun run build

      - name: build and test Rust
        working-directory: ./src-tauri
        run: cargo test --locked

      - name: require updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is required to build signed updater artifacts."
            exit 1
          fi

      - name: build Tauri release bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bunx tauri build ${{ matrix.tauri_args }}

      - name: stage release assets (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob

          appimages=(src-tauri/target/release/bundle/appimage/*.AppImage)
          debs=(src-tauri/target/release/bundle/deb/*.deb)
          rpms=(src-tauri/target/release/bundle/rpm/*.rpm)
          appimage_sigs=(src-tauri/target/release/bundle/appimage/*.AppImage.sig)

          if [ ${#appimages[@]} -eq 0 ] || [ ${#debs[@]} -eq 0 ] || [ ${#rpms[@]} -eq 0 ]; then
            echo "Missing Linux bundle(s):"
            echo "  AppImage: ${#appimages[@]}"
            echo "  deb: ${#debs[@]}"
            echo "  rpm: ${#rpms[@]}"
            ls -laR src-tauri/target/release/bundle || true
            exit 1
          fi
          if [ ${#appimage_sigs[@]} -eq 0 ]; then
            echo "Missing AppImage updater signature (.AppImage.sig)."
            ls -laR src-tauri/target/release/bundle/appimage || true
            exit 1
          fi

          cp "${appimages[0]}" release-assets/swiftmask-linux.AppImage
          cp "${appimage_sigs[0]}" release-assets/swiftmask-linux.AppImage.sig
          cp "${debs[0]}" release-assets/swiftmask-linux.deb
          cp "${rpms[0]}" release-assets/swiftmask-linux.rpm
          ls -la release-assets

      - name: stage release assets (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob

          nsis=(src-tauri/target/release/bundle/nsis/*.exe)
          msis=(src-tauri/target/release/bundle/msi/*.msi)
          nsis_sigs=(src-tauri/target/release/bundle/nsis/*.exe.sig)
          msi_sigs=(src-tauri/target/release/bundle/msi/*.msi.sig)

          if [ ${#nsis[@]} -eq 0 ] || [ ${#msis[@]} -eq 0 ]; then
            echo "Missing Windows bundle(s):"
            echo "  nsis: ${#nsis[@]}"
            echo "  msi: ${#msis[@]}"
            ls -laR src-tauri/target/release/bundle || true
            exit 1
          fi
          if [ ${#nsis_sigs[@]} -eq 0 ]; then
            echo "Missing NSIS updater signature (.exe.sig)."
            ls -laR src-tauri/target/release/bundle/nsis || true
            exit 1
          fi

          cp "${nsis[0]}" release-assets/swiftmask-windows-setup.exe
          cp "${nsis_sigs[0]}" release-assets/swiftmask-windows-setup.exe.sig
          cp "${msis[0]}" release-assets/swiftmask-windows.msi
          if [ ${#msi_sigs[@]} -gt 0 ]; then
            cp "${msi_sigs[0]}" release-assets/swiftmask-windows.msi.sig
          fi
          ls -la release-assets

      - name: upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  publish:
    needs: [verify-version, build]
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: download Linux assets
        uses: actions/download-artifact@v8
        with:
          name: swiftmask-linux
          path: dist

      - name: download Windows assets
        uses: actions/download-artifact@v8
        with:
          name: swiftmask-windows
          path: dist

      - name: ensure AppImage is executable
        run: chmod +x dist/swiftmask-linux.AppImage

      - name: list staged release files
        run: ls -la dist

      - name: extract changelog section
        id: notes
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "body=SwiftMask v${VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BODY=$(awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "${BODY//[[:space:]]/}" ]; then
            echo "body=SwiftMask v${VERSION}" >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<EOF"
              echo "${BODY}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: generate latest.json updater manifest
        env:
          VERSION: ${{ needs.verify-version.outputs.version }}
          NOTES: ${{ steps.notes.outputs.body }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          test -f dist/swiftmask-linux.AppImage.sig
          test -f dist/swiftmask-windows-setup.exe.sig

          TAG="v${VERSION}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          LINUX_SIG="$(tr -d '\r\n' < dist/swiftmask-linux.AppImage.sig)"
          WIN_SIG="$(tr -d '\r\n' < dist/swiftmask-windows-setup.exe.sig)"

          # notes as a single-line JSON string via jq; platforms use NSIS (not MSI)
          # for windows-x86_64 because the static manifest is one URL per os-arch.
          jq -n \
            --arg version "${VERSION}" \
            --arg notes "${NOTES}" \
            --arg pub_date "${PUB_DATE}" \
            --arg linux_url "${BASE}/swiftmask-linux.AppImage" \
            --arg linux_sig "${LINUX_SIG}" \
            --arg win_url "${BASE}/swiftmask-windows-setup.exe" \
            --arg win_sig "${WIN_SIG}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "linux-x86_64": { url: $linux_url, signature: $linux_sig },
                "windows-x86_64": { url: $win_url, signature: $win_sig }
              }
            }' > dist/latest.json

          echo "Generated latest.json:"
          cat dist/latest.json

      - name: create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: SwiftMask ${{ needs.verify-version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(needs.verify-version.outputs.version, '-') }}
          fail_on_unmatched_files: true
          files: |
            dist/swiftmask-linux.AppImage
            dist/swiftmask-linux.AppImage.sig
            dist/swiftmask-linux.deb
            dist/swiftmask-linux.rpm
            dist/swiftmask-windows-setup.exe
            dist/swiftmask-windows-setup.exe.sig
            dist/swiftmask-windows.msi
            dist/latest.json
