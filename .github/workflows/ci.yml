name: CI

# Full CI gate for production: runs on PRs targeting main only.
# Feature → dev PRs intentionally skip CI; validate locally before merging to dev.
# Release builds and publishing happen in release.yml (tag push after dev → main).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: install frontend dependencies
        run: bun install --frozen-lockfile

      - name: lint and format check frontend
        run: bun run lint

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            tauri_args: --bundles appimage,deb,rpm
            artifact_name: swiftmask-linux
            # AppImage + .deb + .rpm (one build, multiple formats)
            artifact_path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
          - platform: windows-latest
            tauri_args: --bundles nsis,msi
            artifact_name: swiftmask-windows
            # NSIS setup.exe + WiX .msi
            artifact_path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

    runs-on: ${{ matrix.platform }}

    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            rpm

      - name: install frontend dependencies
        run: bun install --frozen-lockfile

      - name: check model registry is generated from Rust
        run: bun run gen:models:check

      - name: run frontend unit tests
        run: bun run test

      - name: build frontend
        run: bun run build

      - name: build and test Rust
        working-directory: ./src-tauri
        run: cargo test --locked

      - name: build Tauri release bundle
        # beforeBuildCommand re-runs the frontend build; that is intentional.
        run: bunx tauri build ${{ matrix.tauri_args }}

      - name: upload installers
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14
          # Installers are already compressed; skip zip deflate for faster uploads.
          compression-level: 0

  e2e:
    needs: lint
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: install frontend dependencies
        run: bun install --frozen-lockfile

      - name: install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: run mocked-frontend E2E suite
        run: xvfb-run bun run test:e2e
