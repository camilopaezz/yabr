name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-24.04]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: install frontend dependencies
        run: bun install --frozen-lockfile

      - name: check model registry is generated from Rust
        run: bun run gen:models:check

      - name: run frontend unit tests
        run: bun run test

      - name: build frontend
        run: bun run build

      - name: build and test Rust
        working-directory: ./src-tauri
        run: cargo test --locked

  e2e:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: install frontend dependencies
        run: bun install --frozen-lockfile

      - name: install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: run mocked-frontend E2E suite
        run: xvfb-run bun run test:e2e
